name: Lint

# Run PHP and JS/CSS linters, and verify the admin app builds, on every push
# and pull request.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  php:
    name: PHP (PHPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPCS
        run: composer run lint

  js:
    name: JS + CSS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint JS
        run: npm run lint:js

      - name: Lint CSS
        run: npm run lint:css

      - name: Verify build
        run: npm run build
