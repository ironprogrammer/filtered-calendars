name: Release

# Build the admin app and attach an installable plugin zip to a GitHub Release
# whenever a version tag is pushed, e.g. `git tag v1.0.0 && git push --tags`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin app
        run: npm run build

      - name: Package plugin zip
        run: npx wp-scripts plugin-zip

      - name: Create release and upload zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          filtered-calendars.zip
          --title "$GITHUB_REF_NAME"
          --generate-notes
