name: Plugin Check

# Run the official WordPress Plugin Check against the *packaged* plugin — the
# same zip we ship — so it only sees production files (build/ + PHP + readme),
# not the dev tooling (.phpcs.xml.dist, .github, src, composer, etc.) that
# .distignore keeps out of the distribution.
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      # Build and package exactly what ships, then unpack it for the checker.
      - name: Build and package plugin
        run: |
          npm ci
          npm run build
          npx wp-scripts plugin-zip
          mkdir -p dist
          unzip -q filtered-calendars.zip -d dist

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./dist/filtered-calendars
